<div class="auth-page">
  <div class="auth-container">
    <div class="auth-orb"></div>

    <div class="auth-card animate-fade-in-scale">
      <!-- Header -->
      <div class="auth-header">
        <div class="auth-icon auth-icon--success">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <circle cx="8.5" cy="7" r="4" stroke="currentColor" stroke-width="2" />
            <path d="M20 8v6M23 11h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </div>
        <h1 class="auth-title">Создать аккаунт</h1>
        <p class="auth-subtitle">Заполните форму для регистрации</p>
      </div>

      <!-- Success -->
      @if (success()) {
        <div class="auth-success animate-fade-in">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
            <path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Аккаунт создан! Перенаправляем на вход...
        </div>
      } @else {
        <!-- Error -->
        @if (error()) {
          <div class="auth-error animate-fade-in">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
              <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            {{ error() }}
          </div>
        }

        <!-- Form -->
        <form (ngSubmit)="register()" class="auth-form">
          <div class="form-group">
            <label for="name">Имя</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <circle cx="8.5" cy="7" r="4" stroke="currentColor" stroke-width="2" />
              </svg>
              <input id="name" type="text" placeholder="Ваше имя" [(ngModel)]="name" name="name" autocomplete="name" />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2" />
                <path d="M22 6l-10 7L2 6" stroke="currentColor" stroke-width="2" />
              </svg>
              <input id="email" type="email" placeholder="you@example.com" [(ngModel)]="email" name="email" autocomplete="email" />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Пароль</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" width="18" height="18">
                <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" />
              </svg>
              <input id="password" type="password" placeholder="Минимум 8 символов" [(ngModel)]="password" name="password" autocomplete="new-password" />
            </div>
          </div>

          <button type="submit" class="btn-primary" [disabled]="isLoading()">
            @if (isLoading()) {
              <svg class="spinner" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="32" stroke-linecap="round" />
              </svg>
            }
            {{ isLoading() ? 'Регистрация...' : 'Зарегистрироваться' }}
          </button>
        </form>

        <!-- Footer -->
        <div class="auth-footer">
          <span>Уже есть аккаунт?</span>
          <a routerLink="/login">Войти</a>
        </div>
      }
    </div>
  </div>
</div>
